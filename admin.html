<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reelocash Admin Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrap">
    <div class="hero-card">
      <h1>Admin Panel</h1>
      <p>Check proof requests and manual payout status.</p>
    </div>

    <div class="panel">
      <h3>Proof Requests</h3>
      <div id="proofList" class="history-list"></div>
    </div>

    <div class="panel">
      <h3>Withdrawal Requests</h3>
      <div id="withdrawList" class="history-list"></div>
    </div>
  </div>

  <script>
    let walletBalance = Number(localStorage.getItem("walletBalance") || "0");
    let proofs = JSON.parse(localStorage.getItem("proofs") || "[]");
    let withdrawals = JSON.parse(localStorage.getItem("withdrawals") || "[]");

    function saveData() {
      localStorage.setItem("walletBalance", String(walletBalance));
      localStorage.setItem("proofs", JSON.stringify(proofs));
      localStorage.setItem("withdrawals", JSON.stringify(withdrawals));
    }

    function renderProofs() {
      const box = document.getElementById("proofList");

      if (!proofs.length) {
        box.innerHTML = "No proof requests yet.";
        return;
      }

      box.innerHTML = proofs.slice().reverse().map((item) => {
        const realIndex = proofs.findIndex(p => p.id === item.id);
        return `
          <div class="admin-item">
            <div><strong>Screenshot:</strong> ${item.fileName}</div>
            <div><strong>Proof:</strong> ${item.proofText}</div>
            <div><strong>Reward:</strong> ₹${item.reward}</div>
            <div><strong>Status:</strong> ${item.status}</div>
            <div class="admin-actions">
              <button class="btn btn-success small-btn" onclick="approveProof(${realIndex})">Approve</button>
              <button class="btn btn-danger small-btn" onclick="rejectProof(${realIndex})">Reject</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderWithdrawals() {
      const box = document.getElementById("withdrawList");

      if (!withdrawals.length) {
        box.innerHTML = "No withdrawal requests yet.";
        return;
      }

      box.innerHTML = withdrawals.slice().reverse().map((item) => {
        const realIndex = withdrawals.findIndex(w => w.id === item.id);
        return `
          <div class="admin-item">
            <div><strong>UPI:</strong> ${item.upiId}</div>
            <div><strong>Amount:</strong> ₹${item.amount}</div>
            <div><strong>Status:</strong> ${item.status}</div>
            <div><strong>Message:</strong> ${item.adminMessage}</div>
            <div class="admin-actions">
              <button class="btn btn-primary small-btn" onclick="markProcessing(${realIndex})">Processing</button>
              <button class="btn btn-success small-btn" onclick="markCompleted(${realIndex})">Mark Paid</button>
              <button class="btn btn-danger small-btn" onclick="rejectWithdrawal(${realIndex})">Reject</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function approveProof(index) {
      if (proofs[index].status === "approved") return;
      proofs[index].status = "approved";
      proofs[index].adminMessage = "Verified successfully.";
      walletBalance += Number(proofs[index].reward || 0);
      saveData();
      renderProofs();
      renderWithdrawals();
    }

    function rejectProof(index) {
      proofs[index].status = "rejected";
      proofs[index].adminMessage = "Proof rejected.";
      saveData();
      renderProofs();
    }

    function markProcessing(index) {
      withdrawals[index].status = "processing";
      withdrawals[index].adminMessage = "Please wait 5 to 6 minutes. Your withdrawal is under processing. This may take time.";
      saveData();
      renderWithdrawals();
    }

    function markCompleted(index) {
      withdrawals[index].status = "completed";
      withdrawals[index].adminMessage = "Withdrawal successful. Please check your UPI.";
      saveData();
      renderWithdrawals();
    }

    function rejectWithdrawal(index) {
      withdrawals[index].status = "rejected";
      withdrawals[index].adminMessage = "Withdrawal rejected.";
      walletBalance += Number(withdrawals[index].amount || 0);
      saveData();
      renderWithdrawals();
    }

    renderProofs();
    renderWithdrawals();
  </script>
</body>
</html>
