<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelocash Admin</title>

<style>
body{
margin:0;
background:linear-gradient(180deg,#050f2c,#0a1f5c);
color:white;
font-family:sans-serif;
}

.wrap{
max-width:900px;
margin:auto;
padding:15px;
}

.box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
margin-top:15px;
border-radius:15px;
}

.btn{
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.green{background:#22c55e;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
.gray{background:#64748b;}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<div class="wrap">

<h2>🔥 REELOCASH ADMIN</h2>

<div id="loginBox" class="box">
<input id="email" placeholder="Admin Email">
<input id="password" placeholder="Password">
<button class="btn blue" onclick="login()">Login</button>
<p id="msg"></p>
</div>

<div id="panel" style="display:none">

<div class="box">
<h3>📸 Proof Requests</h3>
<div id="tasks"></div>
</div>

<div class="box">
<h3>💰 Withdraw Requests</h3>
<div id="withdraw"></div>
</div>

<button class="btn red" onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc,
runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCfCPqRhGyL7cmpICldCZChx2cyVe7P9Ww",
authDomain:"reelocash.firebaseapp.com",
projectId:"reelocash",
storageBucket:"reelocash.firebasestorage.app",
messagingSenderId:"134046729864",
appId:"1:134046729864:web:7cea62a512f3141155013d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "ambrishtiwari857@gmail.com";

// login
window.login = async ()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch(e){
msg.innerText=e.message;
}
}

// logout
window.logout = ()=>signOut(auth);

// auth check
onAuthStateChanged(auth, async user=>{
if(user && user.email===ADMIN_EMAIL){

loginBox.style.display="none";
panel.style.display="block";

loadTasks();
loadWithdraw();

}else{
loginBox.style.display="block";
panel.style.display="none";
}
});

// load tasks
async function loadTasks(){
const snap = await getDocs(collection(db,"tasks"));
let html="";

snap.forEach(docu=>{
const d = docu.data();

html+=`
<div class="box">
<p><b>Title:</b> ${d.title}</p>
<p><b>User:</b> ${d.userId}</p>
<p><b>Reward:</b> ₹${d.reward}</p>

<a href="${d.screenshotUrl}" target="_blank">View Proof</a><br>

<button class="btn green" onclick="approve('${docu.id}','${d.userId}',${d.reward})">Approve</button>
<button class="btn red" onclick="reject('${docu.id}')">Reject</button>
<button class="btn gray" onclick="ban('${d.userId}')">Ban User</button>
</div>
`;
});

tasks.innerHTML=html;
}

// approve
window.approve = async (id,uid,reward)=>{

await runTransaction(db, async (tx)=>{
const userRef = doc(db,"users",uid);
const snap = await tx.get(userRef);
const data = snap.data();

tx.update(userRef,{
wallet:(data.wallet||0)+reward
});

tx.update(doc(db,"tasks",id),{
status:"approved"
});
});

alert("Approved ✅");
loadTasks();
}

// reject
window.reject = async (id)=>{
await updateDoc(doc(db,"tasks",id),{
status:"rejected"
});
alert("Rejected ❌");
loadTasks();
}

// ban user
window.ban = async (uid)=>{
await updateDoc(doc(db,"users",uid),{
blocked:true
});
alert("User banned 🚫");
}

// withdraw
async function loadWithdraw(){
const snap = await getDocs(collection(db,"withdrawals"));
let html="";

snap.forEach(docu=>{
const d = docu.data();

html+=`
<div class="box">
<p><b>User:</b> ${d.userId}</p>
<p><b>UPI:</b> ${d.upiId}</p>
<p><b>Amount:</b> ₹${d.amount}</p>

<button class="btn green" onclick="paid('${docu.id}','${d.userId}',${d.amount})">Mark Paid</button>
<button class="btn red" onclick="rejectW('${docu.id}')">Reject</button>
</div>
`;
});

withdraw.innerHTML=html;
}

// paid
window.paid = async (id,uid,amt)=>{

await runTransaction(db, async (tx)=>{
const userRef = doc(db,"users",uid);
const snap = await tx.get(userRef);
const data = snap.data();

tx.update(userRef,{
wallet:(data.wallet||0)-amt
});

tx.update(doc(db,"withdrawals",id),{
status:"paid"
});
});

alert("Payment Done ✅");
loadWithdraw();
}

// reject withdraw
window.rejectW = async (id)=>{
await updateDoc(doc(db,"withdrawals",id),{
status:"rejected"
});
alert("Rejected ❌");
loadWithdraw();
}

</script>

</body>
</html>
