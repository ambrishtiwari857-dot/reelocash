<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reelocash Admin</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .hidden { display:none; }
    .wrap { max-width: 900px; margin: 20px auto; padding: 16px; color: white; }
    .card { background:#0f1d4a; border-radius:16px; padding:16px; margin-bottom:16px; }
    input { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:none; }
    button { padding:10px 14px; border:none; border-radius:10px; cursor:pointer; }
    .btn { background:#2f66ff; color:white; }
    .btn-danger { background:#dc2626; color:white; }
    .btn-success { background:#16a34a; color:white; }
    .row { border:1px solid rgba(255,255,255,.12); border-radius:12px; padding:12px; margin-top:10px; }
    a { color:#93c5fd; }
  </style>
</head>
<body style="background:#07163d;">
  <div class="wrap">
    <div id="loadingBox" class="card">Checking access...</div>

    <div id="loginBox" class="card hidden">
      <h2>Admin Login</h2>
      <input id="email" type="email" placeholder="Admin email" />
      <input id="password" type="password" placeholder="Password" />
      <button id="loginBtn" class="btn">Login</button>
      <p id="loginMsg"></p>
    </div>

    <div id="adminBox" class="hidden">
      <div class="card">
        <h2>Admin Panel</h2>
        <button id="logoutBtn" class="btn-danger">Logout</button>
      </div>

      <div class="card">
        <h3>Proof Requests</h3>
        <div id="tasksBox">Loading...</div>
      </div>

      <div class="card">
        <h3>Withdrawal Requests</h3>
        <div id="withdrawBox">Loading...</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      getDocs,
      query,
      orderBy,
      updateDoc,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCfCPqRhGyL7cmpICldCZChx2cyVe7P9Ww",
      authDomain: "reelocash.firebaseapp.com",
      projectId: "reelocash",
      storageBucket: "reelocash.firebasestorage.app",
      messagingSenderId: "134046729864",
      appId: "1:134046729864:web:7cea62a512f3141155013d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loadingBox = document.getElementById("loadingBox");
    const loginBox = document.getElementById("loginBox");
    const adminBox = document.getElementById("adminBox");
    const loginMsg = document.getElementById("loginMsg");

    async function isAdmin(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      return snap.exists() && snap.data().role === "admin";
    }

    function showLogin(msg = "") {
      loadingBox.classList.add("hidden");
      adminBox.classList.add("hidden");
      loginBox.classList.remove("hidden");
      loginMsg.textContent = msg;
    }

    function showAdmin() {
      loadingBox.classList.add("hidden");
      loginBox.classList.add("hidden");
      adminBox.classList.remove("hidden");
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        loginMsg.textContent = "Email aur password dalo.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        loginMsg.textContent = e.message;
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      showLogin("Logged out.");
    });

    async function loadTasks() {
      const box = document.getElementById("tasksBox");
      const snap = await getDocs(query(collection(db, "tasks"), orderBy("createdAt", "desc")));
      if (snap.empty) {
        box.innerHTML = "No proof requests.";
        return;
      }

      let html = "";
      snap.forEach(d => {
        const x = d.data();
        html += `
          <div class="row">
            <div><b>Task:</b> ${x.title || "-"}</div>
            <div><b>User:</b> ${x.userId || "-"}</div>
            <div><b>Reward:</b> ₹${x.reward || 0}</div>
            <div><b>Status:</b> ${x.status || "pending"}</div>
            <div><b>Proof:</b> ${x.proof || "-"}</div>
            <div style="margin:8px 0;"><a href="${x.screenshotUrl || "#"}" target="_blank">Open Screenshot</a></div>
            <button class="btn-success" onclick="approveTask('${d.id}','${x.userId}',${Number(x.reward || 0)})">Approve</button>
            <button class="btn-danger" onclick="rejectTask('${d.id}')">Reject</button>
          </div>
        `;
      });
      box.innerHTML = html;
    }

    async function loadWithdrawals() {
      const box = document.getElementById("withdrawBox");
      const snap = await getDocs(query(collection(db, "withdrawals"), orderBy("createdAt", "desc")));
      if (snap.empty) {
        box.innerHTML = "No withdrawal requests.";
        return;
      }

      let html = "";
      snap.forEach(d => {
        const x = d.data();
        html += `
          <div class="row">
            <div><b>User:</b> ${x.userId || "-"}</div>
            <div><b>UPI:</b> ${x.upiId || "-"}</div>
            <div><b>Amount:</b> ₹${x.amount || 0}</div>
            <div><b>Status:</b> ${x.status || "pending"}</div>
            <button class="btn" onclick="markProcessing('${d.id}')">Processing</button>
            <button class="btn-success" onclick="markPaid('${d.id}','${x.userId}',${Number(x.amount || 0)})">Mark Paid</button>
            <button class="btn-danger" onclick="rejectWithdrawal('${d.id}')">Reject</button>
          </div>
        `;
      });
      box.innerHTML = html;
    }

    window.approveTask = async (taskId, userId, reward) => {
      const userRef = doc(db, "users", userId);
      const taskRef = doc(db, "tasks", taskId);

      try {
        await runTransaction(db, async (tx) => {
          const userSnap = await tx.get(userRef);
          const taskSnap = await tx.get(taskRef);
          if (!userSnap.exists()) throw new Error("User not found");
          if (!taskSnap.exists()) throw new Error("Task not found");

          const task = taskSnap.data();
          if (task.status === "approved") throw new Error("Already approved");

          const wallet = Number(userSnap.data().wallet || 0) + Number(reward || 0);
          tx.update(userRef, { wallet });
          tx.update(taskRef, {
            status: "approved",
            adminMessage: "Verified successfully."
          });
        });
        await loadTasks();
      } catch (e) {
        alert(e.message);
      }
    };

    window.rejectTask = async (taskId) => {
      try {
        await updateDoc(doc(db, "tasks", taskId), {
          status: "rejected",
          adminMessage: "Proof rejected."
        });
        await loadTasks();
      } catch (e) {
        alert(e.message);
      }
    };

    window.markProcessing = async (withdrawId) => {
      try {
        await updateDoc(doc(db, "withdrawals", withdrawId), {
          status: "processing",
          adminMessage: "Please wait 5 to 6 minutes. Your withdrawal is under processing. This may take time."
        });
        await loadWithdrawals();
      } catch (e) {
        alert(e.message);
      }
    };

    window.markPaid = async (withdrawId, userId, amount) => {
      const userRef = doc(db, "users", userId);
      const withdrawRef = doc(db, "withdrawals", withdrawId);

      try {
        await runTransaction(db, async (tx) => {
          const userSnap = await tx.get(userRef);
          const wSnap = await tx.get(withdrawRef);
          if (!userSnap.exists()) throw new Error("User not found");
          if (!wSnap.exists()) throw new Error("Withdrawal not found");

          const withdrawal = wSnap.data();
          if (withdrawal.status === "completed") throw new Error("Already paid");

          const currentWallet = Number(userSnap.data().wallet || 0);
          if (currentWallet < Number(amount || 0)) throw new Error("Insufficient wallet");

          tx.update(userRef, { wallet: currentWallet - Number(amount || 0) });
          tx.update(withdrawRef, {
            status: "completed",
            adminMessage: "Withdrawal successful. Please check your UPI."
          });
        });
        await loadWithdrawals();
      } catch (e) {
        alert(e.message);
      }
    };

    window.rejectWithdrawal = async (withdrawId) => {
      try {
        await updateDoc(doc(db, "withdrawals", withdrawId), {
          status: "rejected",
          adminMessage: "Withdrawal rejected."
        });
        await loadWithdrawals();
      } catch (e) {
        alert(e.message);
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        showLogin();
        return;
      }

      try {
        const ok = await isAdmin(user.uid);
        if (!ok) {
          await signOut(auth);
          showLogin("Access denied. Admin only.");
          return;
        }

        showAdmin();
        await loadTasks();
        await loadWithdrawals();
      } catch (e) {
        await signOut(auth);
        showLogin("Access check failed.");
      }
    });
  </script>
</body>
</html>
