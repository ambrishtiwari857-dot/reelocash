<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfCPqRhGyL7cmpICldCZChx2cyVe7P9Ww",
  authDomain: "reelocash.firebaseapp.com",
  projectId: "reelocash",
  storageBucket: "reelocash.firebasestorage.app",
  messagingSenderId: "134046729864",
  appId: "1:134046729864:web:7cea62a512f3141155013d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function () {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!email || !pass) {
    document.getElementById("msg").innerText = "Email aur password dalo";
    return;
  }

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => {
      document.getElementById("msg").innerText = "Signup Success ✅";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
}

window.login = function () {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!email || !pass) {
    document.getElementById("msg").innerText = "Email aur password dalo";
    return;
  }

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      document.getElementById("msg").innerText = "Login Success ✅";
    })
    .catch(err => {
      document.getElementById("msg").innerText = err.message;
    });
}
</script>
