<!DOCTYPE html>
<html>
<head>
  <title>Reelocash OTP Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h2>💰 Reelocash</h2>
  <p>Login with Mobile OTP</p>

  <input type="text" id="phone" placeholder="+91XXXXXXXXXX"><br>
  
  <div id="recaptcha-container"></div>

  <button onclick="sendOTP()">Send OTP</button>

  <br><br>

  <input type="text" id="otp" placeholder="Enter OTP"><br>
  <button onclick="verifyOTP()">Verify OTP</button>

  <p id="msg"></p>
</div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

let confirmationResult;

// CAPTCHA
window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
  size: 'normal'
});

// SEND OTP
function sendOTP(){
  let phone = document.getElementById("phone").value;

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
  .then(function(result){
    confirmationResult = result;
    document.getElementById("msg").innerText="OTP Sent ✅";
  })
  .catch(function(error){
    document.getElementById("msg").innerText=error.message;
  });
}


// VERIFY OTP
function verifyOTP(){
  let code = document.getElementById("otp").value;

  confirmationResult.confirm(code)
  .then(function(result){
    let user = result.user;

    // Firestore me save
    db.collection("users").doc(user.uid).set({
      phone: user.phoneNumber,
      wallet: 0,
      role: "user"
    }, {merge:true});

    document.getElementById("msg").innerText="Login Success ✅";

    setTimeout(()=>{
      window.location.href="dashboard.html";
    },1000);

  })
  .catch(function(error){
    document.getElementById("msg").innerText="Wrong OTP ❌";
  });
}

</script>

</body>
</html>
