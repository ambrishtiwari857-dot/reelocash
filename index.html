<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>

  <script>
    const firebaseConfig = {
    apiKey:"IzaSyCfCPqRhGyL7cmpICldCZChx2cyVe7P9Ww",
    authDomain: "reelocash.firebaseapp.com",
    projectId: "reelocash",
    storageBucket: "reelocash.firebasestorage.app",
    messagingSenderId: "134046729864",
    appId: "1:134046729864:web:7cea62a512f3141155013d};

      firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

// SIGNUP
function signup() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
      let user = userCredential.user;

      db.collection("users").doc(user.uid).set({
        name: name,
        email: email,
        role: "user",
        wallet: 0
      });

      alert("Signup Success");
    })
    .catch((error) => {
      alert(error.message);
    });
}

// AUTO LOGIN
auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = user;

    db.collection("users").doc(user.uid).get().then(doc => {
      if (doc.exists) {
        document.getElementById("wallet").innerText = "Wallet: ₹" + doc.data().wallet;
      }
    });
  }
});

// EARN
function earn() {
  if (!currentUser) {
    alert("Login first!");
    return;
  }

  let userRef = db.collection("users").doc(currentUser.uid);

  userRef.get().then(doc => {
    let currentWallet = doc.data().wallet;

    userRef.update({
      wallet: currentWallet + 5
    });

    document.getElementById("wallet").innerText = "Wallet: ₹" + (currentWallet + 5);

    alert("₹5 Added!");
  });
}
</script>
