<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelocash</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1f5c">
<style>
body{margin:0;background:#07163d;color:#fff;font-family:sans-serif}
.top{display:flex;justify-content:space-between;padding:10px;background:#0a1f5c}
.box{background:#0f2a6b;margin:10px;padding:15px;border-radius:10px}
input,select{width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#3b82f6;color:#fff}
.reel{padding:15px;margin-top:8px;background:#2563eb;border-radius:10px}
.hidden{display:none}
</style>
</head>

<body>

<div class="top">
<div id="uid">UID:-</div>
<div>₹ <span id="wallet">0</span></div>
</div>

<div class="box" id="loginBox">
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<div id="app" class="hidden">

<div class="box">
<h3>Referral</h3>
<p id="code"></p>
<p id="link"></p>
<button onclick="copy()">Copy Link</button>
</div>

<div class="box">
<h3>Withdraw</h3>
<select id="method"><option>upi</option></select>
<input id="upi" placeholder="UPI">
<input id="amt" placeholder="Amount">
<button onclick="withdraw()">Withdraw</button>
</div>

<div class="box">
<h3>Reels</h3>
<div class="reel" onclick="r(0)">Reel1</div>
<div class="reel" onclick="r(1)">Reel2</div>
<div class="reel" onclick="r(2)">Reel3</div>
<div class="reel" onclick="r(3)">Reel4</div>
<div class="reel" onclick="r(4)">Reel5</div>
<div class="reel" onclick="r(5)">Reel6</div>
<div class="reel" onclick="r(6)">Reel7</div>
<div class="reel" onclick="r(7)">Reel8</div>
<div class="reel" onclick="r(8)">Reel9</div>
<div class="reel" onclick="r(9)">Reel10</div>
<div class="reel" onclick="r(10)">Reel11</div>
<div class="reel" onclick="r(11)">Reel12</div>
</div>

<button onclick="logout()">Logout</button>

</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,addDoc,collection,serverTimestamp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyCfCPqRhGyL7cmpICldCZChx2cyVe7P9Ww",
authDomain:"reelocash.firebaseapp.com",
projectId:"reelocash"
});
const auth=getAuth(),db=getFirestore();

function codeGen(){return"REF"+Math.random().toString(36).slice(2,8).toUpperCase()}

async function createUser(u){
const code=codeGen();
await setDoc(doc(db,"users",u.uid),{wallet:0,code});
}

signup=async()=>{
let u=await createUserWithEmailAndPassword(auth,email.value,password.value);
await createUser(u.user);
}

login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
logout=()=>signOut(auth);

onAuthStateChanged(auth,async u=>{
if(u){
loginBox.classList.add("hidden");
app.classList.remove("hidden");
uid.innerText=u.uid;
let d=(await getDoc(doc(db,"users",u.uid))).data();
wallet.innerText=d.wallet||0;
code.innerText=d.code;
link.innerText=location.origin+"?ref="+d.code;
}else{
loginBox.classList.remove("hidden");
app.classList.add("hidden");
}
});

copy=()=>navigator.clipboard.writeText(link.innerText);

withdraw=async()=>{
await addDoc(collection(db,"withdrawals"),{
uid:auth.currentUser.uid,
upi:upi.value,
amt:amt.value,
time:serverTimestamp()
});
alert("done");
}

r=i=>{
let a=[
"https://www.instagram.com/reel/DWMdSL0k_Pj/",
"https://www.instagram.com/reel/DLQ62B0S4Gu/",
"https://www.instagram.com/reel/DWY9J2WkaTy/",
"https://www.instagram.com/reel/DWeNkWYEV5a/",
"https://www.instagram.com/reel/DWbuyUfEwIW/",
"https://www.instagram.com/reel/DWWiUlJkQNK/",
"https://www.instagram.com/reel/DWUOP0gE6tq/",
"https://www.instagram.com/reel/DWRRPu0iBEp/",
"https://www.instagram.com/reel/DWOp86DEZlS/",
"https://www.instagram.com/reel/DWIy8vPEZfq/",
"https://www.instagram.com/reel/DWDYV3mkduC/",
"https://www.instagram.com/reel/DWA2MyGkQtQ/"
];
open(a[i]);
}

if("serviceWorker"in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
