<!DOCTYPE html>
<html>
<head>
  <title>Reelocash OTP Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>💰 Reelocash</h2>
  <p>Login with Mobile OTP</p>

  <input type="text" id="phone" placeholder="+91XXXXXXXXXX"><br><br>

  <div id="recaptcha-container"></div><br>

  <button type="button" onclick="sendOTP()">Send OTP</button><br><br>

  <input type="text" id="otp" placeholder="Enter OTP"><br><br>
  <button type="button" onclick="verifyOTP()">Verify OTP</button>

  <p id="msg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js"></script>

<script>
  let confirmationResult = null;
  let recaptchaWidgetId = null;

  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
    size: 'normal',
    callback: function () {
      document.getElementById("msg").innerText = "Captcha verified ✅";
    },
    'expired-callback': function () {
      document.getElementById("msg").innerText = "Captcha expired. Refresh and try again.";
    }
  });

  window.recaptchaVerifier.render().then(function (widgetId) {
    recaptchaWidgetId = widgetId;
  });

  function sendOTP() {
    const phone = document.getElementById("phone").value.trim();
    const msg = document.getElementById("msg");

    if (!phone) {
      msg.innerText = "Enter phone number.";
      return;
    }

    auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
      .then(function (result) {
        confirmationResult = result;
        msg.innerText = "OTP Sent ✅";
      })
      .catch(function (error) {
        msg.innerText = error.message;
        if (typeof grecaptcha !== "undefined" && recaptchaWidgetId !== null) {
          grecaptcha.reset(recaptchaWidgetId);
        }
      });
  }

  function verifyOTP() {
    const code = document.getElementById("otp").value.trim();
    const msg = document.getElementById("msg");

    if (!confirmationResult) {
      msg.innerText = "Send OTP first.";
      return;
    }

    if (!code) {
      msg.innerText = "Enter OTP.";
      return;
    }

    confirmationResult.confirm(code)
      .then(async function (result) {
        const user = result.user;

        await db.collection("users").doc(user.uid).set({
          phone: user.phoneNumber,
          wallet: 0,
          role: "user"
        }, { merge: true });

        msg.innerText = "Login Success ✅";

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);
      })
      .catch(function (error) {
        msg.innerText = error.message || "Wrong OTP ❌";
      });
  }
</script>

</body>
</html>
