<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reelocash</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2895875871668188" crossorigin="anonymous"></script>

<style>
body{margin:0;background:#081a4a;color:#fff;font-family:sans-serif}
.topbar{display:flex;justify-content:space-between;padding:10px;background:#0b1d47}
.box{background:#0b1d47;margin:10px;padding:15px;border-radius:15px}
.btn{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;background:#3b82f6;color:#fff}
.hidden{display:none}
</style>
</head>

<body>

<div class="topbar">
<div>UID: <span id="uidText">-</span></div>
<div onclick="toggleWallet()">₹ <span id="walletBalance">0</span></div>
</div>

<div class="box" id="loginSection">
<h3>Login / Signup</h3>
<input id="email" placeholder="Email"><br><br>
<input id="password" placeholder="Password"><br><br>
<input id="referralInput" placeholder="Referral Code (optional)">
<button class="btn" onclick="signup()">Signup</button>
<button class="btn" onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<div class="box hidden" id="referralSection">
<h3>Your Referral</h3>
<p id="referralCodeText"></p>
<button class="btn" onclick="copyReferralCode()">Copy Code</button>
<p id="referralLinkText"></p>
<button class="btn" onclick="copyReferralLink()">Copy Link</button>
</div>

<div class="box hidden" id="reelsSection">
<h3>Watch Reels</h3>

<button class="btn" onclick="openReel(0)">Reel 1</button>
<button class="btn" onclick="openReel(1)">Reel 2</button>
<button class="btn" onclick="openReel(2)">Reel 3</button>
<button class="btn" onclick="openReel(3)">Reel 4</button>
<button class="btn" onclick="openReel(4)">Reel 5</button>
<button class="btn" onclick="openReel(5)">Reel 6</button>
<button class="btn" onclick="openReel(6)">Reel 7</button>
<button class="btn" onclick="openReel(7)">Reel 8</button>
<button class="btn" onclick="openReel(8)">Reel 9</button>
<button class="btn" onclick="openReel(9)">Reel 10</button>
<button class="btn" onclick="openReel(10)">Reel 11</button>
<button class="btn" onclick="openReel(11)">Reel 12</button>

</div>

<div class="box hidden" id="walletSection">
<h3>Withdrawal</h3>
<input id="upiId" placeholder="UPI ID">
<input id="withdrawAmount" placeholder="Amount">
<button class="btn" onclick="requestWithdrawal()">Withdraw</button>
<p id="withdrawMsg"></p>
</div>

<div class="box hidden" id="proofSection">
<h3>Send Proof</h3>
<input id="taskTitle" placeholder="Task Title">
<input id="taskReward" placeholder="Reward">
<input type="file" id="proofFile">
<textarea id="proofText" placeholder="Details"></textarea>
<button class="btn" onclick="submitProof()">Submit</button>
<p id="proofMsg"></p>
</div>

<div class="box hidden" id="logoutSection">
<button class="btn" onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp, query, where, getDocs, runTransaction }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCfCPqRhGyL7cmpICldCZChx2cyVe7P9Ww",
authDomain: "reelocash.firebaseapp.com",
projectId: "reelocash",
storageBucket: "reelocash.firebasestorage.app",
messagingSenderId: "134046729864",
appId: "1:134046729864:web:7cea62a512f3141155013d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let pendingReferralCode = "";

// referral from URL
function getRefFromUrl(){
const params = new URLSearchParams(window.location.search);
return params.get("ref") || "";
}

function applyReferral(){
const code = getRefFromUrl().toUpperCase();
pendingReferralCode = code;
if(code){
document.getElementById("referralInput").value = code;
}
}
applyReferral();

// signup
window.signup = async ()=>{
const email = email.value;
const pass = password.value;
const ref = referralInput.value || pendingReferralCode;

const user = await createUserWithEmailAndPassword(auth,email,pass);

let code = "REF"+Math.random().toString(36).substring(2,7).toUpperCase();
let link = location.origin+"?ref="+code;

await setDoc(doc(db,"users",user.user.uid),{
wallet:0,
referralCode:code,
referralLink:link
});

// reward referrer
if(ref){
const q = query(collection(db,"users"),where("referralCode","==",ref));
const snap = await getDocs(q);
if(!snap.empty){
const refDoc = snap.docs[0];
await runTransaction(db, async (tx)=>{
const data = refDoc.data();
tx.update(refDoc.ref,{wallet:(data.wallet||0)+5});
});
}
}

loginMsg.innerText="Signup success";
}

// login
window.login = async ()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
}

// logout
window.logout = ()=> signOut(auth);

// auth state
onAuthStateChanged(auth, async user=>{
if(user){
currentUser=user;
uidText.innerText=user.uid;

loginSection.classList.add("hidden");
reelsSection.classList.remove("hidden");
referralSection.classList.remove("hidden");
proofSection.classList.remove("hidden");
logoutSection.classList.remove("hidden");

const snap = await getDoc(doc(db,"users",user.uid));
const data = snap.data();

walletBalance.innerText=data.wallet||0;
referralCodeText.innerText=data.referralCode;
referralLinkText.innerText=data.referralLink;

}else{
loginSection.classList.remove("hidden");
}
});

// reels
window.openReel = (i)=>{
const links=[
"https://www.instagram.com/reel/DWMdSL0k_Pj/",
"https://www.instagram.com/reel/DLQ62B0S4Gu/",
"https://www.instagram.com/reel/DWY9J2WkaTy/",
"https://www.instagram.com/reel/DWeNkWYEV5a/",
"https://www.instagram.com/reel/DWbuyUfEwIW/",
"https://www.instagram.com/reel/DWWiUlJkQNK/",
"https://www.instagram.com/reel/DWUOP0gE6tq/",
"https://www.instagram.com/reel/DWRRPu0iBEp/",
"https://www.instagram.com/reel/DWOp86DEZlS/",
"https://www.instagram.com/reel/DWIy8vPEZfq/",
"https://www.instagram.com/reel/DWDYV3mkduC/",
"https://www.instagram.com/reel/DWA2MyGkQtQ/"
];
window.open(links[i]);
};

// copy
window.copyReferralCode=()=>navigator.clipboard.writeText(referralCodeText.innerText);
window.copyReferralLink=()=>navigator.clipboard.writeText(referralLinkText.innerText);

</script>

</body>
</html>
